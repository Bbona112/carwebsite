<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/signIn.css">
    <title>Sign In - BBM Motors</title>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="brand-link">BBM.</a>
                <p class="auth-kicker">Welcome back</p>
                <h1>Sign in to continue</h1>
                <p class="auth-subtitle">Access your saved vehicles, preferences, and premium updates.</p>
            </div>

            <form class="auth-form">
                <div class="user-box">
                    <input required type="email" id="email">
                    <label for="email">Email</label>
                </div>
                <div class="user-box">
                    <input required type="password" id="password">
                    <label for="password">Password</label>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
                <p class="auth-meta">New to BBM? <a href="signUp.html">Create an account</a></p>
                <p class="auth-meta"><a href="index.html">Back to home</a></p>
            </form>
        </section>
    </main>
</body>
</html>
