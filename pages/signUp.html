<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/signUp.css">
    <title>Sign Up - BBM Motors</title>
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="content">
            <a href="index.html" class="brand-link">BBM.</a>
            <p class="auth-kicker">Create account</p>
            <h1>Create your account</h1>
            <p class="auth-subtitle">Start your premium car journey with saved searches and alerts.</p>
            <form class="auth-form">
                <div class="user-box">
                    <input required type="text" id="name">
                    <label for="name">Name</label>
                </div>
                <div class="user-box">
                    <input required type="email" id="email">
                    <label for="email">Email</label>
                </div>
                <div class="user-box">
                    <input required type="password" id="password">
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
                <p class="auth-meta">Already have an account? <a href="signIn.html">Sign in</a></p>
                <p class="auth-meta"><a href="index.html">Back to home</a></p>
            </form>
        </div>
        </section>
    </main>
</body>
</html>
